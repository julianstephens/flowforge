schema_version: 1

project:
  name: invalid_dlq_processor
  package_name: invalid_dlq_processor
  runtime: python
  iac: terraform

aws:
  region: us-east-1
  account_id: null

components:
  dlq:
    type: sqs_dlq
    enabled: true

  logs:
    type: cloudwatch_logs
    enabled: true

runtime:
  pydantic_models: false
  boto3_clients: false
  lock_manager: false
  idempotency_helpers: false
  structured_logging: false
  python_version: "3.12"
