schema_version: 1

project:
  name: csv_importer
  package_name: csv_importer
  runtime: python
  iac: terraform

aws:
  region: us-east-1
  account_id: null

components:
  orchestrator:
    type: step_functions_standard
    enabled: true

  batch_map:
    type: distributed_map
    enabled: true
    item_source: s3
    input_type: jsonl
    max_concurrency: 500
    tolerated_failure_percentage: 5
    result_writer: s3

  item_processor:
    type: lambda_worker
    enabled: true
    runtime: python3.12
    timeout_seconds: 300
    memory_mb: 1024

  jobs_table:
    type: dynamodb_jobs_table
    enabled: true

  tasks_table:
    type: dynamodb_tasks_table
    enabled: true

  locks_table:
    type: dynamodb_locks_table
    enabled: true
    ttl_attribute: expires_at

  artifacts:
    type: s3_artifact_bucket
    enabled: true

runtime:
  pydantic_models: true
  boto3_clients: true
  lock_manager: true
  idempotency_helpers: true
  structured_logging: true
