aws:
  account_id: null
  region: us-east-1
components:
  artifacts:
    enabled: true
    type: s3_artifact_bucket
  batch_map:
    enabled: true
    input_type: jsonl
    item_source: s3
    max_concurrency: 500
    result_writer: s3
    tolerated_failure_percentage: 5
    type: distributed_map
  item_processor:
    enabled: true
    memory_mb: 1024
    runtime: python3.12
    timeout_seconds: 300
    type: lambda_worker
  jobs_table:
    enabled: true
    type: dynamodb_jobs_table
  locks_table:
    enabled: true
    ttl_attribute: expires_at
    type: dynamodb_locks_table
  orchestrator:
    enabled: true
    type: step_functions_standard
  tasks_table:
    enabled: true
    type: dynamodb_tasks_table
project:
  iac: terraform
  name: csv_importer
  package_name: csv_importer
  runtime: python
runtime:
  boto3_clients: true
  idempotency_helpers: true
  lock_manager: true
  pydantic_models: true
  structured_logging: true
schema_version: 1
